name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build XPI
        run: |
          chmod +x build.sh
          ./build.sh
          
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '"version":' manifest.json | cut -d'"' -f4)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "XPI_NAME=zotero-doi-manager-$VERSION.xpi" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: zotero-doi-manager-${{ steps.get_version.outputs.VERSION }}.xpi
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
